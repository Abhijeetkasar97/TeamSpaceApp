<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#FF7A00"></rect>

  <!-- Team circles -->
  <circle cx="35" cy="40" r="10" fill="white"></circle>
  <circle cx="65" cy="40" r="10" fill="white"></circle>
  <circle cx="50" cy="60" r="10" fill="white"></circle>

  <!-- Connection lines -->
  <line x1="35" y1="40" x2="65" y2="40" stroke="white" stroke-width="4"></line>
  <line x1="35" y1="40" x2="50" y2="60" stroke="white" stroke-width="4"></line>
  <line x1="65" y1="40" x2="50" y2="60" stroke="white" stroke-width="4"></line>

</svg>